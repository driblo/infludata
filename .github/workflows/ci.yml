name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  backend:
    name: Backend (Laravel)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: infludata
          POSTGRES_USER: infludata
          POSTGRES_PASSWORD: infludata
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U infludata"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
      redis:
        image: redis:7
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10

    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.3"
          extensions: pdo, pdo_pgsql, redis, bcmath, intl, zip
          coverage: none
          tools: composer:v2

      - name: Cache composer
        uses: actions/cache@v4
        with:
          path: backend/vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}

      - name: Install
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Copy env
        run: cp .env.example .env

      - name: Key generate
        run: php artisan key:generate

      - name: Pint (lint)
        run: vendor/bin/pint --test

      - name: PHPStan
        run: vendor/bin/phpstan analyse --memory-limit=1G

      - name: Migrate
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: infludata
          DB_USERNAME: infludata
          DB_PASSWORD: infludata
        run: php artisan migrate --force

      - name: Pest
        env:
          DB_CONNECTION: pgsql
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_DATABASE: infludata
          DB_USERNAME: infludata
          DB_PASSWORD: infludata
          REDIS_HOST: 127.0.0.1
          REDIS_CLIENT: predis
        run: vendor/bin/pest

  mobile:
    name: Mobile (Expo / RN)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: mobile/package-lock.json

      - name: Install
        run: npm ci

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Lint
        run: npx eslint .

      - name: Test
        run: npm test -- --ci --coverage

      - name: Web build smoke
        run: npx expo export -p web
