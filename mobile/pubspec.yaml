name: infludata
description: infludata mobile + web client
publish_to: "none"
version: 0.1.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^3.0.0
  riverpod_annotation: ^3.0.0
  go_router: ^14.6.0
  dio: ^5.7.0
  fl_chart: ^0.69.0
  flutter_secure_storage: ^9.2.4
  intl: ^0.19.0
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  riverpod_generator: ^3.0.0
  custom_lint: ^0.7.0
  riverpod_lint: ^3.0.0
  integration_test:
    sdk: flutter

flutter:
  uses-material-design: true
