# infludata local dev stack
# Usage: make up  (or: docker compose up -d --build)

services:
  app:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: infludata-app
    working_dir: /var/www
    volumes:
      - ./backend:/var/www
    environment:
      PHP_IDE_CONFIG: "serverName=infludata"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [infludata]

  nginx:
    image: nginx:1.27-alpine
    container_name: infludata-nginx
    ports: ["8000:80"]
    volumes:
      - ./backend:/var/www
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on: [app]
    networks: [infludata]

  postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: infludata-postgres
    environment:
      POSTGRES_DB: infludata
      POSTGRES_USER: infludata
      POSTGRES_PASSWORD: infludata
    ports: ["5432:5432"]
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U infludata -d infludata"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [infludata]

  redis:
    image: redis:7-alpine
    container_name: infludata-redis
    ports: ["6379:6379"]
    volumes:
      - redis-data:/data
    networks: [infludata]

  horizon:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: infludata-horizon
    working_dir: /var/www
    command: ["php", "artisan", "horizon"]
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [infludata]

  scheduler:
    build:
      context: ./backend
      dockerfile: ../docker/php/Dockerfile
    container_name: infludata-scheduler
    working_dir: /var/www
    # Run schedule:run every 60s, like cron.
    command: ["sh", "-c", "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"]
    volumes:
      - ./backend:/var/www
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks: [infludata]

  mailpit:
    image: axllent/mailpit:latest
    container_name: infludata-mailpit
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI
    networks: [infludata]

  minio:
    image: minio/minio:latest
    container_name: infludata-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: miniominio
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data
    networks: [infludata]

volumes:
  postgres-data:
  redis-data:
  minio-data:

networks:
  infludata:
    driver: bridge
